{% extends 'master/base.html' %}

{% block body %}
  {% include 'master/message.html' %}
  <h1>Log In</h1>
  <h3>Please Fill Up This Form</h3>
  <div class="container">
    <form action="" method="POST">
      {% csrf_token %}
      <div class="mb-3">
        <label for="exampleInputPassword1" class="form-label">Username</label>
        <input type="text" name="username" class="form-control" id="exampleInputPassword1" placeholder="Please Input Username" required />
      </div>
      <div class="mb-3">
        <label for="exampleInputPassword1" class="form-label">Password</label>
        <input type="password" name="password" class="form-control" id="exampleInputPassword1" placeholder="Provide Credential" required />
      </div>
      <div class="mb-3 form-check">
        <input type="checkbox" class="form-check-input" id="exampleCheck1" />
        <label class="form-check-label" for="exampleCheck1">Check me out</label>
      </div>
      <button type="submit" class="btn btn-primary">Submit</button>
    </form>
  </div>
  <p>Don't have an Account?</p>
  <a href="{% url 'sign_up' %}" class="btn btn-info">Create An Account</a>
{% endblock %}
