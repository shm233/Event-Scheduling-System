{% extends 'master/base.html' %}

{% block body %}
  <body>
    {% include 'master/message.html' %}
    <h1>Edit | Event</h1>
    <h3>Please Fill Up This Form</h3>
    <div class="container">
      <form action="" method="POST">
        {% csrf_token %}
        <div class="mb-3">
          <label for="exampleInputPassword1" class="form-label">Title</label>
          <input type="text" name="title" value="{{ events.event_title }}" class="form-control" id="exampleInputPassword1" placeholder="Enter your event title" />
        </div>
        <div class="mb-3">
          <label for="exampleInputEmail1" class="form-label">Event Type</label>
          <select class="form-select" name="type" aria-label="Default select example">
            <option selected>Open this select menu</option>
            <option value="Conference" 
            {% if events.event_type == 'Conference' %}
                selected
            {% endif %}
                >Conference</option>
            <option value="Concert"
            {% if events.event_type == 'Concert' %}
                selected
            {% endif %}
                >Concert</option>
            <option value="Wedding"
            {% if events.event_type == 'Wedding' %}
                selected
            {% endif %}
                >Wedding</option>
            <option value="Graduation"
            {% if events.event_type == 'Graduation' %}
                selected
            {% endif %}
                >Graduation</option>
            <option value="Birthday"
            {% if events.event_type == 'Birthday' %}
                selected
            {% endif %}
                >Birthday</option>
          </select>
        </div>
        <div class="mb-3">
          <label for="exampleFormControlTextarea1" class="form-label">Event Description</label>
          <textarea name="description" class="form-control" id="exampleFormControlTextarea1" rows="3">{{ events.event_description }}</textarea>
        </div>
        <div class="mb-3">
          <label for="exampleInputPassword1" class="form-label">Date</label>
          <input type="date" name="date" value="{{ events.event_date|date:'Y-m-d' }}" class="form-control" id="exampleInputPassword1" />
        </div>
        <div class="mb-3">
          <label for="exampleInputPassword1" class="form-label">Status</label>
          <select class="form-select" aria-label="Default select example">
            <option value="" selected>Open this select menu</option>
            <option value="Not_Started" 
            {% if events.event_status == 'Not_Started' %}
                selected
            {% endif %}
                >Not Started</option>
            <option value="In_Progress"
            {% if events.event_status == 'In_Progress' %}
                selected
            {% endif %}
                >In Progress</option>
            <option value="Completed"
            {% if events.event_status == 'Completed' %}
                selected
            {% endif %}
                >Completed</option>
          </select>
        </div>
        <div class="mb-3">
          <label for="exampleInputPassword1" class="form-label">Location</label>
          <input type="text" name="location" value="{{ events.event_location }}" class="form-control" id="exampleInputPassword1" placeholder="Event City" />
        </div>
        <div class="mb-3">
          <label for="exampleInputPassword1" class="form-label">Picture Associated</label>
          <br>
          <img src="/{{ events.event_image }}" alt="{{ events.event_title }}" height="80px" width="80px" />
          <input type="file" name="photo" class="form-control" id="exampleInputPassword1" />
          <span>Replace or Update this image</span>
        </div>
        <div class="mb-3 form-check">
          <input type="checkbox" class="form-check-input" id="exampleCheck1" />
          <label class="form-check-label" for="exampleCheck1">Check me out</label>
        </div>
        <button type="submit" class="btn btn-primary">Submit</button>
      </form>
    </div>
  </body>
{% endblock %}
